name: focusflow
description: FocusFlow - minimal Apple-style productivity app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2
  table_calendar: ^3.1.2
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  razorpay_flutter: ^1.4.0
  uuid: ^4.5.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
